services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sinfro}
      POSTGRES_USER: ${POSTGRES_USER:-sinfro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sinfro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sin "ports": solo accesible por la red interna de compose (api/worker).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sinfro} -d ${POSTGRES_DB:-sinfro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # requirepass vacío = sin auth (red interna). Definí REDIS_PASSWORD para activarla.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    # Sin "ports": solo accesible por la red interna de compose (api/worker).
    # El healthcheck añade -a solo si hay password (sirve con auth y sin auth).
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - api_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_SCAN_INTERVAL_MIN: ${VITE_SCAN_INTERVAL_MIN:-60}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - proxy
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  api_storage:
  caddy_data:
  caddy_config:

networks:
  proxy:
    external: true
